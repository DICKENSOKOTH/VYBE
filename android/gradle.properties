org.gradle.jvmargs=-Xmx4G -XX:MaxMetaspaceSize=2G -XX:ReservedCodeCacheSize=512m -XX:+HeapDumpOnOutOfMemoryError
org.gradle.daemon=true
org.gradle.parallel=true
org.gradle.caching=true
android.useAndroidX=true
android.enableJetifier=true

# Tells the Kotlin Gradle plugin not to fail the build when Java and Kotlin
# JVM targets differ across subprojects (e.g. on_audio_query sets Java 1.8
# while the Kotlin plugin defaults to 17). Documented at:
# https://kotlinlang.org/docs/gradle-configure-project.html#check-for-jvm-target-compatibility-of-related-compile-tasks
kotlin.jvm.target.validation.mode=ignore